*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0F172A}
body{font-family:'Poppins',sans-serif;color:#F1F5F9;-webkit-font-smoothing:antialiased}

input,textarea,button,select{font-family:'Poppins',sans-serif}
textarea{resize:vertical}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@keyframes slideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.shake{animation:shake .4s ease}
.si{animation:slideIn .3s ease both}
.spin{animation:spin 1s linear infinite;display:inline-block}
button{cursor:pointer;border:none;outline:none;transition:opacity .15s}

function entryToRow(date,e){return{data:date,foco:e.foco||null,sono:e.sono||null,humor:e.humor||null,emocao:e.emocao||null,alcool:e.alcool||null,movimento:e.movimento||null,financas:e.financas||null,ansiedade:e.ansiedade||null,procrast:e.procrast||null,produtiv:e.produtiv||null,nota_foco:e.n_foco||null,nota_sono:e.n_sono||null,nota_humor:e.n_humor||null,nota_emocao:e.n_emocao||null,nota_alcool:e.n_alcool||null,nota_movimento:e.n_movimento||null,nota_financas:e.n_financas||null,nota_ansiedade:e.n_ansiedade||null,nota_procrast:e.n_procrast||null,nota_produtiv:e.n_produtiv||null}}

function doseAt(med,date){return[...med.doses].sort((a,b)=>a.data>b.data?1:-1).filter(d=>d.data<=date).slice(-1)[0]||null}
function medsAt(meds,date){return meds.filter(m=>m.dataInicio<=date&&(!m.dataFim||m.dataFim>=date))}
function weekKey(date){const d=new Date(date+"T12:00:00");const j=new Date(d.getFullYear(),0,1);const w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return`${d.getFullYear()}-W${String(w).padStart(2,"0")}`}

function exportCSV(entries){
  const cols=DIMS.map(d=>d.id);
  const hdr=["data",...cols,...cols.map(c=>`nota_${c}`),"media_geral"];
  const rows=Object.keys(entries).sort().map(date=>{
    const e=entries[date];const sc=cols.map(c=>e[c]||"");
    const nt=cols.map(c=>`"${(e[`n_${c}`]||"").replace(/"/g,'""')}"`);
    const av=sc.filter(Boolean).length?(sc.filter(Boolean).reduce((a,b)=>a+Number(b),0)/sc.filter(Boolean).length).toFixed(2):"";
    return[date,...sc,...nt,av].join(",");
  });
  const url=URL.createObjectURL(new Blob([[hdr.join(","),...rows].join("\n")],{type:"text/csv"}));
  Object.assign(document.createElement("a"),{href:url,download:"dashboard_vida.csv"}).click();
  URL.revokeObjectURL(url);
}

function TrendLine({data,color,markers=[],dates=[]}){
  if(data.length<2)return null;
  const w=260,h=50,p=4;
  const xs=data.map((_,i)=>p+(i/(data.length-1))*(w-2*p));
  const ys=data.map(v=>h-p-((v-1)/4)*(h-2*p));
  const path=xs.map((x,i)=>`${i?"L":"M"}${x},${ys[i]}`).join(" ");
  const mxs=markers.map(d=>{const i=dates.indexOf(d);return i>=0?p+(i/(data.length-1))*(w-2*p):null}).filter(x=>x!==null);
  return<svg width={w} height={h} style={{overflow:"visible",display:"block"}}>
    {mxs.map((x,i)=><line key={i} x1={x} y1={-4} x2={x} y2={h+4} stroke={`${WARNING}88`} strokeWidth="1.5" strokeDasharray="4,3"/>)}
    <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>
    <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="3.5" fill={color}/>
  </svg>;
}

function PinScreen({onUnlock}){
  const[pin,setPin]=useState("");const isFirst=!localStorage.getItem(PIN_KEY);const[step,setStep]=useState(1);const[conf,setConf]=useState("");const[err,setErr]=useState(false);const stored=localStorage.getItem(PIN_KEY);
  const err_=()=>{setErr(true);setTimeout(()=>{setErr(false);setPin("");setConf("");setStep(1)},600)};
  const digit=d=>{if(!isFirst){const n=pin+d;setPin(n);if(n.length===4){n===stored?(sessionStorage.setItem(SES_KEY,"1"),onUnlock()):err_()}}else{if(step===1){const n=pin+d;setPin(n);if(n.length===4)setStep(2)}else{const n=conf+d;setConf(n);if(n.length===4){n===pin?(localStorage.setItem(PIN_KEY,pin),sessionStorage.setItem(SES_KEY,"1"),onUnlock()):err_()}}}};
  const del=()=>{if(!isFirst||step===1)setPin(p=>p.slice(0,-1));else setConf(p=>p.slice(0,-1))};
  const cur=!isFirst?pin:step===1?pin:conf;
  const lbl=!isFirst?"Digite seu PIN":step===1?"Crie um PIN de 4 dígitos":"Confirme o PIN";
  return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",background:BG}}>
    <div className="fa" style={{textAlign:"center",marginBottom:"44px"}}>

    {!isFirst&&<div style={{marginTop:"28px",fontSize:"12px",color:TEXT2}}>Esqueceu o PIN? Limpe os dados do site para redefinir.</div>}
  </div>;
}

// ── Correlação ─────────────────────────────────────────────────────────────
function DualAxisChart({datePoints}){
  // datePoints: [{date, score, dose}]
  if(datePoints.length<2)return null;
  const W=300,H=130,PL=36,PR=36,PT=12,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;

  const scores=datePoints.map(p=>p.score);
  const doses=datePoints.map(p=>p.dose);
  const minDose=Math.min(...doses),maxDose=Math.max(...doses);
  const doseRange=maxDose-minDose||1;

  const xs=datePoints.map((_,i)=>PL+(i/(datePoints.length-1))*cW);
  const scoreY=s=>PT+cH-((s-1)/4)*cH;
  const doseY=d=>PT+cH-((d-minDose)/doseRange)*cH;

  // Score path
  const scorePath=xs.map((x,i)=>`${i?"L":"M"}${x},${scoreY(scores[i])}`).join(" ");

  // Dose step path (step-after)
  let dosePath="";
  xs.forEach((x,i)=>{
    const y=doseY(doses[i]);
    if(i===0){dosePath+=`M${x},${y}`;}
    else{
      const prevY=doseY(doses[i-1]);
      dosePath+=`L${x},${prevY}L${x},${y}`;
    }
  });

  // Dose change markers
  const doseChanges=datePoints.filter((p,i)=>i>0&&p.dose!==datePoints[i-1].dose);

  // Y axis labels score
  const scoreLabels=[1,2,3,4,5];
  // Y axis labels dose
  const doseLabels=minDose===maxDose?[minDose]:[minDose,maxDose];

  return<svg width={W} height={H} style={{display:"block",overflow:"visible"}}>
    {/* Grid */}
    {scoreLabels.map(s=><line key={s} x1={PL} y1={scoreY(s)} x2={W-PR} y2={scoreY(s)} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>)}

    {/* Dose change markers */}
    {doseChanges.map((p,i)=>{
      const idx=datePoints.indexOf(p);
      const x=xs[idx];
      return<g key={i}>
        <line x1={x} y1={PT} x2={x} y2={PT+cH} stroke={`${WARNING}60`} strokeWidth="1.5" strokeDasharray="4,3"/>
        <text x={x} y={PT-2} textAnchor="middle" fontSize="9" fill={WARNING}>{p.dose}mg</text>
      </g>;
    })}

    {/* Dose line */}
    <path d={dosePath} fill="none" stroke={WARNING} strokeWidth="1.5" opacity=".7" strokeLinejoin="round"/>
    {/* Score line */}
    <path d={scorePath} fill="none" stroke={ACCENT} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>

    {/* Score dots */}
    {xs.map((x,i)=><circle key={i} cx={x} cy={scoreY(scores[i])} r="3" fill={C[Math.round(scores[i])]}/>)}

    {/* Left Y axis — Score */}
    <text x={PL-4} y={scoreY(5)} textAnchor="end" fontSize="9" fill={ACCENT} dominantBaseline="middle">5</text>
    <text x={PL-4} y={scoreY(3)} textAnchor="end" fontSize="9" fill={ACCENT} dominantBaseline="middle">3</text>
    <text x={PL-4} y={scoreY(1)} textAnchor="end" fontSize="9" fill={ACCENT} dominantBaseline="middle">1</text>

    {/* Right Y axis — Dose */}
    {doseLabels.map((d,i)=><text key={i} x={W-PR+4} y={doseY(d)} textAnchor="start" fontSize="9" fill={WARNING} dominantBaseline="middle">{d}mg</text>)}

    {/* X axis labels */}
    {datePoints.map((p,i)=>{
      if(datePoints.length<=7||i%(Math.ceil(datePoints.length/6))===0||i===datePoints.length-1)
        return<text key={i} x={xs[i]} y={H-4} textAnchor="middle" fontSize="9" fill={TEXT2}>{fmtS(p.date)}</text>;
      return null;
    })}

    {/* Axis lines */}
    <line x1={PL} y1={PT} x2={PL} y2={PT+cH} stroke="rgba(255,255,255,0.1)" strokeWidth="1"/>
    <line x1={PL} y1={PT+cH} x2={W-PR} y2={PT+cH} stroke="rgba(255,255,255,0.1)" strokeWidth="1"/>
  </svg>;
}

function CorrelacaoTab({entries,meds}){
  const activeMeds=meds.filter(m=>m.doses.length>0);
  const[selMed,setSelMed]=useState(activeMeds[0]?.id||null);

  const med=meds.find(m=>m.id===selMed);
  const sortedDates=Object.keys(entries).sort();

  // Pontos para o gráfico dual
  const datePoints=useMemo(()=>{
    if(!med)return[];
    return sortedDates.map(date=>{
      const e=entries[date];
      const d=doseAt(med,date);
      if(!e||!d)return null;
      return{date,score:avg(e),dose:d.mg};
    }).filter(Boolean);
  },[med,entries,sortedDates]);

  // Períodos por dose
  const periods=useMemo(()=>{
    if(!med)return[];
    const dosesSort=[...med.doses].sort((a,b)=>a.data>b.data?1:-1);
    return dosesSort.map((dose,i)=>{
      const nextDose=dosesSort[i+1];
      const datesInPeriod=sortedDates.filter(d=>
        d>=dose.data&&entries[d]&&(!nextDose||d<nextDose.data)
      );
      if(!datesInPeriod.length)return null;
      const dimAvgs=DIMS.map(dim=>{
        const vals=datesInPeriod.map(d=>entries[d][dim.id]).filter(Boolean);
        return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
      });
      const overall=+(datesInPeriod.reduce((s,d)=>s+avg(entries[d]),0)/datesInPeriod.length).toFixed(1);
      return{dose:dose.mg,startDate:dose.data,endDate:nextDose?.data||null,dates:datesInPeriod,dimAvgs,overall};
    }).filter(Boolean);
  },[med,entries,sortedDates]);

  if(!med||activeMeds.length===0){
    return<div style={{textAlign:"center",padding:"56px 20px",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>
      <div style={{fontSize:"32px",marginBottom:"12px"}}>💊</div>
      Cadastre um medicamento com dose<br/>na aba Tratamento para ver a correlação.
    </div>;
  }

  if(datePoints.length<2){
    return<div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      {activeMeds.length>1&&<MedSelector meds={activeMeds} selMed={selMed} setSelMed={setSelMed}/>}
      <div style={{textAlign:"center",padding:"56px 20px",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>
        <div style={{fontSize:"32px",marginBottom:"12px"}}>📈</div>
        Registre pelo menos 2 dias<br/>para ver a correlação com a dose.

      <div style={{fontSize:"12px",color:TEXT2,lineHeight:1.6}}>

      </div>
    </div>}

    {[...periods].reverse().map((period,pi)=>{

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>

              {pi===0&&<span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"20px",background:`${SUCCESS}20`,color:SUCCESS,fontWeight:"600"}}>Atual</span>}
            </div>
            <div style={{fontSize:"11px",color:TEXT2,marginTop:"3px"}}>
              {fmtS(period.startDate)} → {period.endDate?fmtS(period.endDate):"hoje"} · {period.dates.length} dia{period.dates.length>1?"s":""}

          </div>
        </div>

        {/* Dimensões */}
        <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
          {DIMS.map((dim,di)=>{

            if(!val)return null;
            const delta=prevVal?(val-prevVal).toFixed(1):null;
            return<div key={dim.id} style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"13px",minWidth:"20px"}}>{dim.icon}</span>
              <div style={{flex:1,height:"6px",borderRadius:"3px",background:SURFACE,overflow:"hidden"}}>

              </div>
              <span style={{fontSize:"12px",fontWeight:"700",color:C[Math.round(val)],minWidth:"24px",textAlign:"right"}}>{val}</span>
              {delta!==null&&<span style={{fontSize:"10px",fontWeight:"600",minWidth:"32px",textAlign:"right",
                color:parseFloat(delta)>0?SUCCESS:parseFloat(delta)<0?DANGER:TEXT2}}>
                {parseFloat(delta)>0?"▲":parseFloat(delta)<0?"▼":"="}{Math.abs(delta)}
              </span>}
            </div>;
          })}
        </div>
      </div>;
    })}
  </div>;
}

          return<div key={i} style={{aspectRatio:"1",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",background:e?`${C[Math.round(av)]}28`:isFuture?"transparent":SURFACE,border:isToday?`2px solid ${ACCENT}`:e?`1px solid ${C[Math.round(av)]}50`:`1px solid ${BORDER}`,opacity:isFuture?.2:1}}>

function WeeklyView({entries}){
  const sorted=Object.keys(entries).sort();if(sorted.length<2)return<div style={{textAlign:"center",padding:"56px 0",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>Registre pelo menos 2 dias<br/>para ver o resumo semanal.</div>;
  const byWeek={};sorted.forEach(date=>{const wk=weekKey(date);if(!byWeek[wk]){byWeek[wk]={dates:[],entries:[]}}byWeek[wk].dates.push(date);byWeek[wk].entries.push(entries[date])});
  const weeks=Object.keys(byWeek).sort().reverse();
  return<div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    {weeks.map((wk,wi)=>{const{dates,entries:es}=byWeek[wk];const wkAvg=+(es.reduce((s,e)=>s+avg(e),0)/es.length).toFixed(1);const prevWk=weeks[wi+1];const prevAvg=prevWk?(byWeek[prevWk].entries.reduce((s,e)=>s+avg(e),0)/byWeek[prevWk].entries.length):null;const delta=prevAvg?(wkAvg-prevAvg).toFixed(1):null;
      return<div key={wk} className="fa" style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>
          <div><div style={{fontSize:"13px",fontWeight:"700",color:TEXT}}>{fmtS(dates[0])} — {fmtS(dates[dates.length-1])}</div><div style={{fontSize:"11px",color:TEXT2,marginTop:"2px"}}>{es.length} dia{es.length>1?"s":""} registrado{es.length>1?"s":""}</div></div>
          <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
            {delta!==null&&<span style={{fontSize:"11px",fontWeight:"600",color:parseFloat(delta)>0?SUCCESS:parseFloat(delta)<0?DANGER:TEXT2}}>{parseFloat(delta)>0?"▲":parseFloat(delta)<0?"▼":"="} {Math.abs(delta)}</span>}
            <span style={{fontSize:"22px",fontWeight:"800",color:C[Math.round(wkAvg)]}}>{wkAvg}</span>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
          {DIMS.map(dim=>{const vals=es.map(e=>e[dim.id]).filter(Boolean);if(!vals.length)return null;const dAvg=+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
            return<div key={dim.id} style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"13px",minWidth:"20px"}}>{dim.icon}</span>
              <div style={{flex:1,height:"6px",borderRadius:"3px",background:SURFACE,overflow:"hidden"}}><div style={{height:"100%",width:`${(dAvg/5)*100}%`,borderRadius:"3px",background:C[Math.round(dAvg)]}}/></div>
              <span style={{fontSize:"12px",fontWeight:"700",color:C[Math.round(dAvg)],minWidth:"28px",textAlign:"right"}}>{dAvg}</span>
            </div>;
          })}
        </div>
      </div>;
    })}
  </div>;
}

function TratamentoTab({meds,setMeds,onMedChange,onMedDelete}){
  const[showAdd,setShowAdd]=useState(false);const[doseModal,setDoseModal]=useState(null);
  const blank={nome:"",principioAtivo:"",prescritor:"",dataInicio:today(),precoEmb:"",capsulasEmb:"30",mgInicial:""};
  const[form,setForm]=useState(blank);const[doseForm,setDoseForm]=useState({data:today(),mg:""});const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const addMed=()=>{if(!form.nome||!form.dataInicio)return;const doses=form.mgInicial?[{id:uid(),data:form.dataInicio,mg:parseFloat(form.mgInicial)}]:[];const med={id:uid(),...form,precoEmb:parseFloat(form.precoEmb)||0,capsulasEmb:parseInt(form.capsulasEmb)||30,doses,dataFim:null};const u=[...meds,med];setMeds(u);persist(MED_KEY,u);onMedChange(med);setShowAdd(false);setForm(blank)};
  const addDose=id=>{if(!doseForm.mg)return;const u=meds.map(m=>m.id===id?{...m,doses:[...m.doses,{id:uid(),...doseForm,mg:parseFloat(doseForm.mg)}]}:m);setMeds(u);persist(MED_KEY,u);const med=u.find(m=>m.id===id);if(med)onMedChange(med);setDoseModal(null);setDoseForm({data:today(),mg:""})};
  const toggleFim=id=>{const u=meds.map(m=>m.id===id?{...m,dataFim:m.dataFim?null:today()}:m);setMeds(u);persist(MED_KEY,u);const med=u.find(m=>m.id===id);if(med)onMedChange(med)};
  const delMed=id=>{if(!confirm("Remover este medicamento?"))return;const u=meds.filter(m=>m.id!==id);setMeds(u);persist(MED_KEY,u);onMedDelete(id)};

    {meds.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>Nenhum medicamento cadastrado.<br/>Adicione seu tratamento acima.</div>}

      <Field label="Nome *"><input style={inp} placeholder="Ex: Atentah" value={form.nome} onChange={f("nome")}/></Field>
      <Field label="Princípio ativo"><input style={inp} placeholder="Ex: Atomoxetina" value={form.principioAtivo} onChange={f("principioAtivo")}/></Field>
      <Field label="Prescritor"><input style={inp} placeholder="Nome do psiquiatra" value={form.prescritor} onChange={f("prescritor")}/></Field>
      <Field label="Data de início *"><input style={inp} type="date" value={form.dataInicio} onChange={f("dataInicio")}/></Field>
      <Field label="Dose inicial (mg)"><input style={inp} type="number" placeholder="Ex: 25" value={form.mgInicial} onChange={f("mgInicial")}/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
        <Field label="Preço embalagem (R$)"><input style={inp} type="number" placeholder="0,00" value={form.precoEmb} onChange={f("precoEmb")}/></Field>
        <Field label="Cápsulas / embalagem"><input style={inp} type="number" placeholder="30" value={form.capsulasEmb} onChange={f("capsulasEmb")}/></Field>
      </div>
      <button onClick={addMed} style={{width:"100%",padding:"14px",borderRadius:"8px",border:"none",background:ACCENT,color:"#fff",fontSize:"14px",fontWeight:"700",fontFamily:"inherit",marginTop:"4px"}}>Salvar medicamento</button>
    </Modal>}
    {doseModal&&<Modal title="Ajuste de dosagem" onClose={()=>setDoseModal(null)}>
      <div style={{fontSize:"13px",color:TEXT2,marginBottom:"16px"}}>{meds.find(m=>m.id===doseModal)?.nome}</div>
      <Field label="Data"><input style={inp} type="date" value={doseForm.data} onChange={e=>setDoseForm(p=>({...p,data:e.target.value}))}/></Field>
      <Field label="Nova dose (mg)"><input style={inp} type="number" placeholder="Ex: 40" value={doseForm.mg} onChange={e=>setDoseForm(p=>({...p,mg:e.target.value}))}/></Field>
      <button onClick={()=>addDose(doseModal)} style={{width:"100%",padding:"14px",borderRadius:"8px",border:"none",background:ACCENT,color:"#fff",fontSize:"14px",fontWeight:"700",fontFamily:"inherit",marginTop:"4px"}}>Registrar</button>
    </Modal>}
  </div>;
}

// ── APP
function App(){
  const[unlocked,setUnlocked]=useState(!!sessionStorage.getItem(SES_KEY));
  const[view,setView]=useState("home");
  const[histView,setHistView]=useState("cards");
  const[entries,setEntries]=useState(()=>loadJ(DATA_KEY,{}));
  const[meds,setMeds]=useState(()=>loadJ(MED_KEY,[]));
  const[selDate,setSelDate]=useState(today());
  const[draft,setDraft]=useState({});
  const[anchors,setAnchors]=useState(true);
  const[openNotes,setOpenNotes]=useState({});
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);
  const[syncStatus,setSyncStatus]=useState("idle");

  useEffect(()=>{
    if(!unlocked)return;
    setSyncStatus("syncing");
    Promise.all([sbFetchEntries(),sbFetchMeds()])
      .then(([re,rm])=>{
        const merged={...loadJ(DATA_KEY,{}),...re};
        setEntries(merged);persist(DATA_KEY,merged);
        if(rm.length>0){setMeds(rm);persist(MED_KEY,rm);}
        setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000);
      })
      .catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000);});
  },[unlocked]);

  useEffect(()=>{const e=entries[selDate];setDraft(e?{...e}:{});setOpenNotes({});},[selDate]);

  if(!unlocked)return<PinScreen onUnlock={()=>setUnlocked(true)}/>;

  const allFilled=DIMS.every(d=>draft[d.id]>0);
  const isToday=selDate===today();
  const alreadySaved=!!entries[selDate];

  const handleSave=()=>{
    if(!allFilled)return;setSaving(true);
    const u={...entries,[selDate]:draft};persist(DATA_KEY,u);setEntries(u);setSaved(true);
    setSyncStatus("syncing");
    sbUpsertEntry(selDate,draft).then(()=>{setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000);}).catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000);});
    setTimeout(()=>{setSaved(false);setSaving(false);setView("history");},1600);
  };

  const handleMedChange=med=>{setSyncStatus("syncing");sbUpsertMed(med).then(()=>{setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000);}).catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000);})};
  const handleMedDelete=id=>{setSyncStatus("syncing");sbDeleteMed(id).then(()=>{setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000);}).catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000);})};

  const sorted=Object.keys(entries).sort();
  const last7=sorted.slice(-7);
  const allDoseMarkers=[...new Set(meds.flatMap(m=>m.doses.map(d=>d.data)))];
  const markersInLast7=allDoseMarkers.filter(d=>last7.includes(d));
  const medsHoje=medsAt(meds,today());
  const dimAvg=id=>{const v=last7.map(d=>entries[d]?.[id]).filter(Boolean);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):null};

  const navBtn=a=>({flex:1,padding:"8px 2px",borderRadius:"8px",border:"none",fontFamily:"inherit",background:a?`${ACCENT}20`:SURFACE2,color:a?ACCENT:TEXT2,fontSize:"11px",fontWeight:a?"600":"400",cursor:"pointer"});
  const subBtn=a=>({padding:"6px 12px",borderRadius:"6px",border:`1px solid ${a?ACCENT:BORDER}`,fontFamily:"inherit",background:a?`${ACCENT}15`:"transparent",color:a?ACCENT:TEXT2,fontSize:"11px",fontWeight:a?"600":"400",cursor:"pointer"});

  return<div style={{minHeight:"100vh",maxWidth:"430px",margin:"0 auto",paddingBottom:"90px",background:BG}}>

    {/* Header */}
    <div style={{padding:"52px 20px 16px",borderBottom:`1px solid ${BORDER}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:"10px",letterSpacing:".18em",textTransform:"uppercase",color:ACCENT,marginBottom:"4px",fontWeight:"700"}}>Dashboard da Vida</div>
          <div style={{fontSize:"21px",fontWeight:"800",color:TEXT,letterSpacing:"-.02em"}}>Acompanhamento TDAH</div>
        </div>
        <div style={{marginTop:"4px"}}><SyncBadge status={syncStatus}/></div>
      </div>
      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"8px"}}>
        {medsHoje.map(m=>{const d=doseAt(m,today());return<span key={m.id} style={{fontSize:"11px",padding:"3px 10px",borderRadius:"20px",background:`${ACCENT}15`,color:ACCENT,fontWeight:"600"}}>💊 {m.nome}{d?` ${d.mg}mg`:""}</span>})}
        {medsHoje.length===0&&<span style={{fontSize:"11px",color:TEXT2}}>{meds.length===0?"Cadastre seu tratamento na aba Tratamento":"Nenhum medicamento ativo"}</span>}
      </div>
    </div>

    {/* Nav — 5 abas */}
    <div style={{display:"flex",padding:"10px 20px",gap:"5px",background:SURFACE,borderBottom:`1px solid ${BORDER}`}}>
      {[["home","Hoje"],["history","Histórico"],["stats","Evolução"],["corr","Correlação"],["trat","Tratamento"]].map(([v,l])=>(
        <button key={v} onClick={()=>setView(v)} style={navBtn(view===v)}>{l}</button>
      ))}
    </div>

    <div style={{padding:"12px 20px"}}>

      {/* ── HOJE ── */}
      {view==="home"&&<div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
        <div style={{...card,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
          <div>
            <div style={{fontSize:"11px",color:TEXT2,fontWeight:"600",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"3px"}}>{isToday?"Data do registro":"Registro retroativo"}</div>
            <div style={{fontSize:"13px",fontWeight:"600",color:isToday?ACCENT:WARNING}}>{isToday?"Hoje · "+new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"}):fmtF(selDate)}</div>
          </div>
          <input type="date" value={selDate} max={today()} onChange={e=>setSelDate(e.target.value)} style={{...inp,width:"auto",padding:"7px 10px",fontSize:"12px",borderColor:isToday?BORDER:`${WARNING}50`}}/>
        </div>
        {!isToday&&<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 12px",borderRadius:"8px",background:`${WARNING}10`,border:`1px solid ${WARNING}30`}}>
          <span style={{fontSize:"16px"}}>📅</span><span style={{fontSize:"12px",color:WARNING}}>Você está editando um registro passado</span>
        </div>}
        {alreadySaved&&<div className="fa" style={{...card,background:`${SUCCESS}12`,border:`1px solid ${SUCCESS}35`,display:"flex",alignItems:"center",gap:"12px"}}>
          <span style={{fontSize:"22px"}}>✅</span>
          <div>
            <div style={{fontWeight:"600",fontSize:"13px",color:TEXT}}>{isToday?"Registrado hoje":"Já registrado neste dia"}</div>
            <div style={{fontSize:"12px",color:TEXT2}}>Média: <span style={{color:C[Math.round(avg(entries[selDate]))],fontWeight:"700"}}>{avg(entries[selDate])}</span> · editando abaixo</div>
          </div>
        </div>}
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>setAnchors(p=>!p)} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:"8px",padding:"4px 10px",fontSize:"11px",color:TEXT2,fontFamily:"inherit"}}>{anchors?"Ocultar âncoras":"Ver âncoras"}</button>
        </div>
        {DIMS.map(dim=><div key={dim.id} className="fa" style={card}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"19px"}}>{dim.icon}</span><span style={{fontSize:"14px",fontWeight:"600",color:TEXT}}>{dim.label}</span></div>
            <button onClick={()=>setOpenNotes(p=>({...p,[dim.id]:!p[dim.id]}))} style={{background:openNotes[dim.id]?`${ACCENT}15`:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"8px",padding:"3px 10px",fontSize:"11px",color:openNotes[dim.id]?ACCENT:TEXT2,fontFamily:"inherit"}}>+ nota</button>
          </div>
          <div style={{display:"flex",gap:"6px",justifyContent:"center"}}>
            {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setDraft(p=>({...p,[dim.id]:n}))} style={{width:"46px",height:"46px",borderRadius:"8px",fontFamily:"inherit",border:draft[dim.id]===n?`2px solid ${C[n]}`:`1px solid ${BORDER}`,background:draft[dim.id]===n?`${C[n]}20`:SURFACE,color:draft[dim.id]===n?C[n]:TEXT2,fontSize:"16px",fontWeight:draft[dim.id]===n?"700":"400",transition:"all .15s"}}>{n}</button>)}
          </div>
          {draft[dim.id]>0&&<div style={{textAlign:"center",fontSize:"11px",color:C[draft[dim.id]],fontWeight:"600",letterSpacing:".05em",textTransform:"uppercase",marginTop:"8px"}}>{dim.desc[draft[dim.id]-1]}</div>}
          {anchors&&<div style={{display:"flex",justifyContent:"space-between",marginTop:"10px",gap:"8px"}}>
            <div style={{fontSize:"10px",color:TEXT2,maxWidth:"46%",lineHeight:1.4,opacity:.75}}>① {dim.a1}</div>
            <div style={{fontSize:"10px",color:TEXT2,maxWidth:"46%",lineHeight:1.4,textAlign:"right",opacity:.75}}>⑤ {dim.a5}</div>
          </div>}
          {openNotes[dim.id]&&<textarea rows={2} placeholder={`Observação sobre ${dim.label.toLowerCase()}...`} value={draft[`n_${dim.id}`]||""} onChange={e=>setDraft(p=>({...p,[`n_${dim.id}`]:e.target.value}))} style={{marginTop:"12px",width:"100%",background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"8px",padding:"10px 12px",color:TEXT,fontSize:"13px",outline:"none",lineHeight:"1.5",fontFamily:"inherit"}}/>}
        </div>)}
        <button onClick={handleSave} disabled={!allFilled||saving} style={{width:"100%",padding:"16px",borderRadius:"8px",border:"none",fontFamily:"inherit",background:saved?SUCCESS:allFilled?ACCENT:SURFACE2,color:allFilled?"#fff":TEXT2,fontSize:"15px",fontWeight:"700",cursor:allFilled?"pointer":"default",transition:"all .2s",marginTop:"4px"}}>
          {saved?"✓ Salvo!":saving?"Salvando...":alreadySaved?"Atualizar registro":"Salvar registro"}
        </button>
      </div>}

      {/* ── HISTÓRICO ── */}
      {view==="history"&&<div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
          {[["cards","Cards"],["heatmap","Heatmap"],["weekly","Semanal"],["table","Tabela"]].map(([v,l])=>(
            <button key={v} onClick={()=>setHistView(v)} style={subBtn(histView===v)}>{l}</button>
          ))}
        </div>
        {sorted.length>0&&<button onClick={()=>exportCSV(entries)} style={{width:"100%",padding:"11px",borderRadius:"8px",background:`${SUCCESS}12`,border:`1px solid ${SUCCESS}35`,color:SUCCESS,fontSize:"13px",fontWeight:"600",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>⬇ Exportar CSV ({sorted.length} registros)</button>}
        {histView==="cards"&&(sorted.length===0?<div style={{textAlign:"center",padding:"56px 0",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>Nenhum registro ainda.<br/>Comece pelo "Hoje".</div>:[...sorted].reverse().map(date=><HistoryItem key={date} date={date} entry={entries[date]} meds={meds} allDoseMarkers={allDoseMarkers}/>))}
        {histView==="heatmap"&&<HeatmapView entries={entries}/>}
        {histView==="weekly"&&<WeeklyView entries={entries}/>}
        {histView==="table"&&<div style={{...card,overflowX:"auto"}}><TableView entries={entries}/></div>}
      </div>}

      {/* ── EVOLUÇÃO ── */}
      {view==="stats"&&<div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        {sorted.length<2&&<div style={{textAlign:"center",padding:"56px 0",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>Registre pelo menos 2 dias<br/>para ver a evolução.</div>}
        {sorted.length>=2&&<>
          {markersInLast7.length>0&&<div style={{...card,background:`${WARNING}08`,border:`1px solid ${WARNING}30`,display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{width:"22px",height:"0",borderTop:`2px dashed ${WARNING}80`,flexShrink:0}}/>
            <span style={{fontSize:"12px",color:WARNING}}>Linha tracejada = ajuste de dose</span>
          </div>}
          <div style={card}>
            <div style={{fontSize:"10px",color:TEXT2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:"12px",fontWeight:"600"}}>Média geral · últimos {last7.length} dias</div>
            <div style={{display:"flex",gap:"4px",alignItems:"flex-end",height:"52px"}}>
              {last7.map(date=>{const e=entries[date];const av=DIMS.reduce((s,d)=>s+(e?.[d.id]||0),0)/DIMS.length;const h=Math.max(8,(av/5)*52);const isDose=allDoseMarkers.includes(date);
                return<div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
                  <div style={{width:"100%",height:`${h}px`,borderRadius:"4px 4px 2px 2px",background:C[Math.round(av)],opacity:.85,outline:isDose?`2px solid ${WARNING}`:""}}/>
                  <div style={{fontSize:"9px",color:isDose?WARNING:TEXT2,fontWeight:isDose?"700":"400"}}>{fmtS(date)}</div>
                </div>;
              })}
            </div>
          </div>
          {DIMS.map(dim=>{const av=dimAvg(dim.id);const data=last7.map(d=>entries[d]?.[dim.id]).filter(Boolean);const an=Math.round(parseFloat(av));
            return<div key={dim.id} className="fa" style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:data.length>=2?"10px":"0"}}>
                <div style={{display:"flex",alignItems:"center",gap:"9px"}}>
                  <span style={{fontSize:"18px"}}>{dim.icon}</span>
                  <div><div style={{fontSize:"13px",fontWeight:"600",color:TEXT}}>{dim.label}</div><div style={{fontSize:"10px",color:av?C[an]:TEXT2,fontWeight:"600",marginTop:"2px"}}>Média {av||"--"} · {last7.length} dias</div></div>
                </div>
                <span style={{fontSize:"22px",fontWeight:"800",color:av?C[an]:TEXT2}}>{av||"--"}</span>
              </div>
              {data.length>=2&&<TrendLine data={data} color={C[an]||ACCENT} markers={markersInLast7} dates={last7}/>}
            </div>;
          })}
        </>}
      </div>}

      {/* ── CORRELAÇÃO ── */}
      {view==="corr"&&<CorrelacaoTab entries={entries} meds={meds}/>}

      {/* ── TRATAMENTO ── */}
      {view==="trat"&&<TratamentoTab meds={meds} setMeds={setMeds} onMedChange={handleMedChange} onMedDelete={handleMedDelete}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
