<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F8FAFC}
body{font-family:'Poppins',sans-serif;color:#0F172A;-webkit-font-smoothing:antialiased;line-height:1.6}
::-webkit-scrollbar{width:0}
input,textarea,button,select{font-family:'Poppins',sans-serif}
textarea{resize:vertical}
input[type=date]::-webkit-calendar-picker-indicator{filter:none;opacity:.6}

/* ElevaMind Design System — Tema Claro */
:root{
  --bg:       #F8FAFC;
  --card:     #FFFFFF;
  --primary:  #092F59;
  --success:  #22C55E;
  --danger:   #EF4444;
  --warning:  #FBBF24;
  --info:     #3B82F6;
  --text:     #0F172A;
  --text2:    #475569;
  --disabled: #CBD5E1;
  --border:   #E2E8F0;
  --radius-sm:4px;
  --radius-md:6px;
  --radius-lg:8px;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 10px 24px rgba(0,0,0,0.10);
  --transition-fast:200ms ease-in-out;
  --transition-normal:300ms ease-in-out;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(80px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fa{animation:fadeUp .3s ease both}
.shake{animation:shake .4s ease}
.si{animation:slideIn .3s ease both}
.slide-up{animation:slideUp .4s ease both}
.spin{animation:spin 1s linear infinite;display:inline-block}
button{cursor:pointer;border:none;outline:none;transition:all var(--transition-fast)}
button:active{opacity:.8;transform:scale(.98)}
</style>

let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;window.__showInstallBanner&&window.__showInstallBanner();});
window.addEventListener("appinstalled",()=>{deferredPrompt=null;window.__hideInstallBanner&&window.__hideInstallBanner();});
window.__triggerInstall=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==="accepted")deferredPrompt=null;};
</script>

function exportCSV(entries){const cols=DIMS.map(d=>d.id);const hdr=["data",...cols,...cols.map(c=>`nota_${c}`),"media_geral"];const rows=Object.keys(entries).sort().map(date=>{const e=entries[date];const sc=cols.map(c=>e[c]>0?e[c]:"");const nt=cols.map(c=>`"${(e[`n_${c}`]||"").replace(/"/g,'""')}"`);const av=avgEntry(e)||"";return[date,...sc,...nt,av].join(",")});const url=URL.createObjectURL(new Blob([[hdr.join(","),...rows].join("\n")],{type:"text/csv"}));Object.assign(document.createElement("a"),{href:url,download:"clarity_registros.csv"}).click();URL.revokeObjectURL(url)}

// ── Likert Scale com N/A ──────────────────────────────────────────────────
function LikertScale({value,onChange}){

          fontSize:"15px",fontWeight:value===n?"700":"500",
          boxShadow:value===n?`0 2px 8px ${C[n]}40`:"none",
        }}>{n}</button>
      ))}
      <button onClick={()=>onChange(0)} style={{
        width:"42px",height:"42px",borderRadius:"6px",fontFamily:"inherit",

        color:value===0?TEXT2:DISABLED,

// ── SyncBadge ─────────────────────────────────────────────────────────────
function SyncBadge({status}){
  const cfg={
    syncing:{icon:"↻",color:INFO,    spin:true, label:"Sincronizando..."},
    synced: {icon:"✓",color:SUCCESS, spin:false,label:"Sincronizado"},
    error:  {icon:"⚠",color:WARNING, spin:false,label:"Offline — salvo localmente"},
  }[status];
  if(!cfg)return null;
  return(
    <div style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"20px",
      background:`${cfg.color}15`,border:`1px solid ${cfg.color}40`,fontSize:"11px",color:cfg.color,fontWeight:"600"}}>
      <span className={cfg.spin?"spin":""}>{cfg.icon}</span>{cfg.label}
    </div>
  );
}

function MiniBar({value}){
  if(!value||value===0)return<span style={{fontSize:"11px",color:DISABLED,fontWeight:"500"}}>N/A</span>;
  return(
    <div style={{display:"flex",gap:"2px"}}>
      {[1,2,3,4,5].map(n=><div key={n} style={{width:"8px",height:"8px",borderRadius:"2px",
        background:n<=value?C[value]:BORDER}}/>)}
    </div>
  );
}

function TrendLine({data,color,markers=[],dates=[]}){
  if(data.length<2)return null;
  const w=260,h=50,p=4;
  const xs=data.map((_,i)=>p+(i/(data.length-1))*(w-2*p));
  const ys=data.map(v=>h-p-((v-1)/4)*(h-2*p));
  const path=xs.map((x,i)=>`${i?"L":"M"}${x},${ys[i]}`).join(" ");
  const mxs=markers.map(d=>{const i=dates.indexOf(d);return i>=0?p+(i/(data.length-1))*(w-2*p):null}).filter(x=>x!==null);
  return(
    <svg width={w} height={h} style={{overflow:"visible",display:"block"}}>
      {mxs.map((x,i)=><line key={i} x1={x} y1={-4} x2={x} y2={h+4} stroke={`${WARNING}80`} strokeWidth="1.5" strokeDasharray="4,3"/>)}
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="3.5" fill={color}/>
    </svg>
  );
}

// ── Install Banner ─────────────────────────────────────────────────────────
function InstallBanner(){
  const[show,setShow]=useState(false);
  const[dismissed,setDismissed]=useState(()=>!!localStorage.getItem("clarity_install_dismissed"));
  useEffect(()=>{window.__showInstallBanner=()=>{if(!dismissed)setShow(true)};window.__hideInstallBanner=()=>setShow(false);return()=>{delete window.__showInstallBanner;delete window.__hideInstallBanner}},[dismissed]);
  const dismiss=()=>{setShow(false);setDismissed(true);localStorage.setItem("clarity_install_dismissed","1")};
  const install=()=>{window.__triggerInstall&&window.__triggerInstall();setShow(false)};
  if(!show)return null;
  return ReactDOM.createPortal(
    <div className="slide-up" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200}}>
      <div style={{background:CARD,borderTop:`1px solid ${BORDER}`,borderRadius:"16px 16px 0 0",
        padding:"20px",margin:"0 auto",maxWidth:"430px",boxShadow:"0 -8px 32px rgba(0,0,0,0.12)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"16px"}}>
          <img src="icon-192.png" alt="icon" style={{width:"52px",height:"52px",borderRadius:"8px",flexShrink:0}}/>
          <div>
            <div style={{fontSize:"15px",fontWeight:"700",color:TEXT}}>Clarity</div>
            <div style={{fontSize:"12px",color:TEXT2,marginTop:"2px"}}>Instale na tela inicial para acesso rápido e uso offline</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"10px"}}>
          <button onClick={dismiss} style={{flex:1,padding:"11px",borderRadius:"6px",background:BG,border:`1px solid ${BORDER}`,color:TEXT2,fontSize:"13px",fontWeight:"500"}}>Agora não</button>
          <button onClick={install} style={{flex:2,padding:"11px",borderRadius:"6px",background:PRIMARY,border:"none",color:"#fff",fontSize:"13px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"}}>⬇ Instalar app</button>
        </div>
      </div>
    </div>,
    document.getElementById("install-banner")
  );
}

// ── PIN ────────────────────────────────────────────────────────────────────
function PinScreen({onUnlock}){
  const[pin,setPin]=useState("");const isFirst=!localStorage.getItem(PIN_KEY);const[step,setStep]=useState(1);const[conf,setConf]=useState("");const[err,setErr]=useState(false);const stored=localStorage.getItem(PIN_KEY);
  const err_=()=>{setErr(true);setTimeout(()=>{setErr(false);setPin("");setConf("");setStep(1)},600)};
  const digit=d=>{if(!isFirst){const n=pin+d;setPin(n);if(n.length===4){n===stored?(sessionStorage.setItem(SES_KEY,"1"),onUnlock()):err_()}}else{if(step===1){const n=pin+d;setPin(n);if(n.length===4)setStep(2)}else{const n=conf+d;setConf(n);if(n.length===4){n===pin?(localStorage.setItem(PIN_KEY,pin),sessionStorage.setItem(SES_KEY,"1"),onUnlock()):err_()}}}};
  const del=()=>{if(!isFirst||step===1)setPin(p=>p.slice(0,-1));else setConf(p=>p.slice(0,-1))};
  const cur=!isFirst?pin:step===1?pin:conf;
  const lbl=!isFirst?"Digite seu PIN":step===1?"Crie um PIN de 4 dígitos":"Confirme o PIN";
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",background:BG}}>
      <div className="fa" style={{textAlign:"center",marginBottom:"44px"}}>
        <img src="icon-192.png" alt="icon" style={{width:"72px",height:"72px",borderRadius:"16px",marginBottom:"16px",boxShadow:"0 4px 16px rgba(9,47,89,0.15)"}}/>
        <div style={{fontSize:"26px",fontWeight:"800",color:PRIMARY,letterSpacing:"-.02em"}}>Clarity</div>
        <div style={{fontSize:"13px",color:TEXT2,marginTop:"4px"}}>Meu dia, minha evolução</div>
        <div style={{fontSize:"12px",color:DISABLED,marginTop:"10px"}}>{lbl}</div>
      </div>
      <div className={err?"shake":""} style={{display:"flex",gap:"14px",marginBottom:"40px"}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:"14px",height:"14px",borderRadius:"50%",
          background:i<cur.length?(err?DANGER:PRIMARY):BORDER,
          transition:"background 200ms ease-in-out",
          boxShadow:i<cur.length&&!err?`0 0 0 3px ${PRIMARY}20`:""}}/>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:"10px"}}>
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
          <button key={i} onClick={()=>{if(k==="⌫")del();else if(k!=="")digit(String(k))}}
            style={{height:"64px",borderRadius:"8px",fontSize:k==="⌫"?"20px":"22px",fontWeight:"600",
              background:k===""?"transparent":CARD,color:k==="⌫"?TEXT2:TEXT,
              border:`1px solid ${k===""?"transparent":BORDER}`,cursor:k===""?"default":"pointer",
              boxShadow:k===""?"none":"0 1px 3px rgba(0,0,0,0.06)"}}>
            {k}
          </button>
        ))}
      </div>
      {!isFirst&&<div style={{marginTop:"28px",fontSize:"12px",color:DISABLED}}>Esqueceu o PIN? Limpe os dados do site para redefinir.</div>}
    </div>
  );
}

// ── Modal ──────────────────────────────────────────────────────────────────
function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="si" style={{background:CARD,borderRadius:"16px 16px 0 0",padding:"24px 20px 44px",
        width:"100%",maxWidth:"430px",maxHeight:"90vh",overflowY:"auto",
        border:`1px solid ${BORDER}`,boxShadow:"0 -8px 32px rgba(0,0,0,0.1)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
          <div style={{fontSize:"16px",fontWeight:"700",color:TEXT}}>{title}</div>
          <button onClick={onClose} style={{background:BG,border:`1px solid ${BORDER}`,borderRadius:"6px",padding:"4px 12px",color:TEXT2,fontSize:"13px"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({label,hint,children}){
  return(
    <div style={{marginBottom:"14px"}}>
      <div style={{fontSize:"11px",color:TEXT2,textTransform:"uppercase",letterSpacing:".08em",fontWeight:"600",marginBottom:"6px"}}>{label}</div>
      {children}
      {hint&&<div style={{fontSize:"11px",color:DISABLED,marginTop:"4px"}}>{hint}</div>}
    </div>
  );
}

  const byWeek={};sorted.forEach(date=>{const wk=weekKey(date);if(!byWeek[wk])byWeek[wk]={dates:[],entries:[]};byWeek[wk].dates.push(date);byWeek[wk].entries.push(entries[date])});

// ── Correlação ─────────────────────────────────────────────────────────────
function DualAxisChart({datePoints}){
  if(datePoints.length<2)return null;
  const W=300,H=130,PL=36,PR=36,PT=12,PB=28;const cW=W-PL-PR,cH=H-PT-PB;
  const scores=datePoints.map(p=>p.score);const doses=datePoints.map(p=>p.dose);
  const minDose=Math.min(...doses),maxDose=Math.max(...doses);const doseRange=maxDose-minDose||1;
  const xs=datePoints.map((_,i)=>PL+(i/(datePoints.length-1))*cW);
  const scoreY=s=>PT+cH-((s-1)/4)*cH;const doseY=d=>PT+cH-((d-minDose)/doseRange)*cH;
  const scorePath=xs.map((x,i)=>`${i?"L":"M"}${x},${scoreY(scores[i])}`).join(" ");
  let dosePath="";xs.forEach((x,i)=>{const y=doseY(doses[i]);if(i===0)dosePath+=`M${x},${y}`;else{const pY=doseY(doses[i-1]);dosePath+=`L${x},${pY}L${x},${y}`}});
  const doseChanges=datePoints.filter((p,i)=>i>0&&p.dose!==datePoints[i-1].dose);
  return(
    <svg width={W} height={H} style={{display:"block",overflow:"visible"}}>
      {[1,2,3,4,5].map(s=><line key={s} x1={PL} y1={scoreY(s)} x2={W-PR} y2={scoreY(s)} stroke={BORDER} strokeWidth="1"/>)}
      {doseChanges.map((p,i)=>{const idx=datePoints.indexOf(p);const x=xs[idx];return<g key={i}><line x1={x} y1={PT} x2={x} y2={PT+cH} stroke={`${WARNING}80`} strokeWidth="1.5" strokeDasharray="4,3"/><text x={x} y={PT-2} textAnchor="middle" fontSize="9" fill={WARNING} fontWeight="600">{p.dose}mg</text></g>})}
      <path d={dosePath} fill="none" stroke={WARNING} strokeWidth="2" opacity=".8" strokeLinejoin="round"/>
      <path d={scorePath} fill="none" stroke={PRIMARY} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>
      {xs.map((x,i)=><circle key={i} cx={x} cy={scoreY(scores[i])} r="3.5" fill={C[Math.round(scores[i])]} stroke={CARD} strokeWidth="1.5"/>)}
      <text x={PL-4} y={scoreY(5)} textAnchor="end" fontSize="9" fill={PRIMARY} dominantBaseline="middle" fontWeight="600">5</text>
      <text x={PL-4} y={scoreY(3)} textAnchor="end" fontSize="9" fill={PRIMARY} dominantBaseline="middle" fontWeight="600">3</text>
      <text x={PL-4} y={scoreY(1)} textAnchor="end" fontSize="9" fill={PRIMARY} dominantBaseline="middle" fontWeight="600">1</text>
      {[minDose,maxDose].filter((d,i,a)=>a.indexOf(d)===i).map((d,i)=><text key={i} x={W-PR+4} y={doseY(d)} textAnchor="start" fontSize="9" fill={WARNING} dominantBaseline="middle" fontWeight="600">{d}mg</text>)}
      {datePoints.map((p,i)=>{if(datePoints.length<=7||i%(Math.ceil(datePoints.length/6))===0||i===datePoints.length-1)return<text key={i} x={xs[i]} y={H-4} textAnchor="middle" fontSize="9" fill={TEXT2}>{fmtS(p.date)}</text>;return null;})}
      <line x1={PL} y1={PT} x2={PL} y2={PT+cH} stroke={BORDER} strokeWidth="1"/>
      <line x1={PL} y1={PT+cH} x2={W-PR} y2={PT+cH} stroke={BORDER} strokeWidth="1"/>
    </svg>
  );
}

  const periods=useMemo(()=>{if(!med)return[];const dosesSort=[...med.doses].sort((a,b)=>a.data>b.data?1:-1);return dosesSort.map((dose,i)=>{const nextDose=dosesSort[i+1];const datesInPeriod=sortedDates.filter(d=>d>=dose.data&&entries[d]&&(!nextDose||d<nextDose.data));if(!datesInPeriod.length)return null;const dimAvgs=DIMS.map(dim=>{const vals=datesInPeriod.map(d=>entries[d][dim.id]).filter(v=>v>0);return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null});const avs=datesInPeriod.map(d=>avgEntry(entries[d])).filter(Boolean);const overall=avs.length?+(avs.reduce((a,b)=>a+b,0)/avs.length).toFixed(1):null;return{dose:dose.mg,startDate:dose.data,endDate:nextDose?.data||null,dates:datesInPeriod,dimAvgs,overall}}).filter(Boolean)},[med,entries,sortedDates]);

        <div style={{overflowX:"auto"}}><DualAxisChart datePoints={datePoints}/></div>

  const addMed=()=>{if(!form.nome||!form.dataInicio)return;const doses=form.mgInicial?[{id:uid(),data:form.dataInicio,mg:parseFloat(form.mgInicial)}]:[];const med={id:uid(),...form,precoEmb:parseFloat(form.precoEmb)||0,capsulasEmb:parseInt(form.capsulasEmb)||30,doses,dataFim:null};const u=[...meds,med];setMeds(u);persist(MED_KEY,u);onMedChange(med);setShowAdd(false);setForm(blank)};
  const addDose=id=>{if(!doseForm.mg)return;const u=meds.map(m=>m.id===id?{...m,doses:[...m.doses,{id:uid(),...doseForm,mg:parseFloat(doseForm.mg)}]}:m);setMeds(u);persist(MED_KEY,u);const med=u.find(m=>m.id===id);if(med)onMedChange(med);setDoseModal(null);setDoseForm({data:today(),mg:""})};
  const toggleFim=id=>{const u=meds.map(m=>m.id===id?{...m,dataFim:m.dataFim?null:today()}:m);setMeds(u);persist(MED_KEY,u);const med=u.find(m=>m.id===id);if(med)onMedChange(med)};
  const delMed=id=>{if(!confirm("Remover este medicamento?"))return;const u=meds.filter(m=>m.id!==id);setMeds(u);persist(MED_KEY,u);onMedDelete(id)};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:"13px",borderRadius:"6px",background:`${PRIMARY}10`,border:`1px solid ${PRIMARY}30`,color:PRIMARY,fontSize:"13px",fontWeight:"600",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",fontFamily:"inherit"}}>+ Adicionar medicamento</button>

      {meds.map(med=>{const ativo=!med.dataFim||med.dataFim>=today();const custoDia=med.precoEmb&&med.capsulasEmb?med.precoEmb/med.capsulasEmb:0;const dosesSort=[...med.doses].sort((a,b)=>a.data>b.data?1:-1);const doseAtual=dosesSort[dosesSort.length-1];
        return<div key={med.id} className="fa" style={{...card,opacity:ativo?1:.6}}>

                <span style={{fontSize:"10px",fontWeight:"600",padding:"2px 8px",borderRadius:"20px",background:ativo?`${SUCCESS}15`:`${TEXT2}15`,color:ativo?SUCCESS:TEXT2}}>{ativo?"Ativo":"Encerrado"}</span>
              </div>
              {med.principioAtivo&&<div style={{fontSize:"12px",color:TEXT2,marginTop:"2px"}}>{med.principioAtivo}</div>}
              {med.prescritor&&<div style={{fontSize:"11px",color:TEXT2,marginTop:"1px"}}>Dr(a). {med.prescritor}</div>}
            </div>
            <button onClick={()=>delMed(med.id)} style={{background:`${DANGER}10`,border:`1px solid ${DANGER}30`,borderRadius:"6px",padding:"4px 10px",fontSize:"11px",color:DANGER,marginLeft:"8px",fontFamily:"inherit",fontWeight:"600"}}>✕</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"14px"}}>
            <span style={{fontSize:"11px",padding:"4px 10px",borderRadius:"20px",background:BG,color:TEXT2,border:`1px solid ${BORDER}`}}>📅 {fmtS(med.dataInicio)}{med.dataFim?` → ${fmtS(med.dataFim)}`:""}</span>
            {doseAtual&&<span style={{fontSize:"11px",padding:"4px 10px",borderRadius:"20px",background:`${PRIMARY}10`,color:PRIMARY,fontWeight:"600",border:`1px solid ${PRIMARY}20`}}>💊 {doseAtual.mg}mg</span>}
            {custoDia>0&&<span style={{fontSize:"11px",padding:"4px 10px",borderRadius:"20px",background:`${SUCCESS}10`,color:SUCCESS,border:`1px solid ${SUCCESS}20`}}>{brl(custoDia)}/dia</span>}
            {med.precoEmb>0&&<span style={{fontSize:"11px",padding:"4px 10px",borderRadius:"20px",background:BG,color:TEXT2,border:`1px solid ${BORDER}`}}>Emb: {brl(med.precoEmb)} · {med.capsulasEmb} caps</span>}
          </div>
          {med.doses.length>0&&<div style={{marginBottom:"14px"}}>
            <div style={{fontSize:"11px",color:TEXT2,textTransform:"uppercase",letterSpacing:".08em",fontWeight:"600",marginBottom:"8px"}}>Histórico de dosagem</div>
            <div style={{position:"relative",paddingLeft:"18px"}}>
              <div style={{position:"absolute",left:"7px",top:0,bottom:0,width:"1px",background:BORDER}}/>
              {[...med.doses].sort((a,b)=>a.data>b.data?1:-1).map((d,i,arr)=><div key={d.id} style={{position:"relative",marginBottom:"8px",display:"flex",alignItems:"center",gap:"10px"}}>
                <div style={{position:"absolute",left:"-13px",width:"8px",height:"8px",borderRadius:"50%",background:i===arr.length-1?PRIMARY:BORDER,border:`2px solid ${i===arr.length-1?PRIMARY:CARD}`}}/>
                <span style={{fontSize:"12px",color:TEXT2,minWidth:"50px"}}>{fmtS(d.data)}</span>
                <span style={{fontSize:"13px",fontWeight:"600",color:i===arr.length-1?PRIMARY:TEXT}}>{d.mg}mg</span>
                {i===arr.length-1&&<span style={{fontSize:"10px",color:PRIMARY,fontWeight:"500"}}>atual</span>}
              </div>)}
            </div>
          </div>}
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={()=>setDoseModal(med.id)} style={{flex:1,padding:"9px",borderRadius:"6px",background:`${PRIMARY}10`,border:`1px solid ${PRIMARY}30`,color:PRIMARY,fontSize:"12px",fontWeight:"600",fontFamily:"inherit"}}>+ Ajuste de dose</button>
            <button onClick={()=>toggleFim(med.id)} style={{flex:1,padding:"9px",borderRadius:"6px",background:BG,border:`1px solid ${BORDER}`,color:TEXT2,fontSize:"12px",fontFamily:"inherit"}}>{ativo?"Encerrar":"Reativar"}</button>
          </div>
        </div>;
      })}
      {showAdd&&<Modal title="Novo medicamento" onClose={()=>setShowAdd(false)}>
        <Field label="Nome *"><input style={inp} placeholder="Ex: Atentah" value={form.nome} onChange={f("nome")}/></Field>
        <Field label="Princípio ativo"><input style={inp} placeholder="Ex: Atomoxetina" value={form.principioAtivo} onChange={f("principioAtivo")}/></Field>
        <Field label="Prescritor"><input style={inp} placeholder="Nome do psiquiatra" value={form.prescritor} onChange={f("prescritor")}/></Field>
        <Field label="Data de início *"><input style={inp} type="date" value={form.dataInicio} onChange={f("dataInicio")}/></Field>
        <Field label="Dose inicial (mg)"><input style={inp} type="number" placeholder="Ex: 25" value={form.mgInicial} onChange={f("mgInicial")}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          <Field label="Preço embalagem (R$)"><input style={inp} type="number" placeholder="0,00" value={form.precoEmb} onChange={f("precoEmb")}/></Field>
          <Field label="Cápsulas / embalagem"><input style={inp} type="number" placeholder="30" value={form.capsulasEmb} onChange={f("capsulasEmb")}/></Field>
        </div>
        <button onClick={addMed} style={{width:"100%",padding:"14px",borderRadius:"6px",border:"none",background:PRIMARY,color:"#fff",fontSize:"14px",fontWeight:"700",fontFamily:"inherit",marginTop:"4px"}}>Salvar medicamento</button>
      </Modal>}
      {doseModal&&<Modal title="Ajuste de dosagem" onClose={()=>setDoseModal(null)}>
        <div style={{fontSize:"13px",color:TEXT2,marginBottom:"16px"}}>{meds.find(m=>m.id===doseModal)?.nome}</div>
        <Field label="Data"><input style={inp} type="date" value={doseForm.data} onChange={e=>setDoseForm(p=>({...p,data:e.target.value}))}/></Field>
        <Field label="Nova dose (mg)"><input style={inp} type="number" placeholder="Ex: 40" value={doseForm.mg} onChange={e=>setDoseForm(p=>({...p,mg:e.target.value}))}/></Field>
        <button onClick={()=>addDose(doseModal)} style={{width:"100%",padding:"14px",borderRadius:"6px",border:"none",background:PRIMARY,color:"#fff",fontSize:"14px",fontWeight:"700",fontFamily:"inherit",marginTop:"4px"}}>Registrar</button>
      </Modal>}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const[unlocked,setUnlocked]=useState(!!sessionStorage.getItem(SES_KEY));
  const[view,setView]=useState("home");const[histView,setHistView]=useState("cards");
  const[entries,setEntries]=useState(()=>loadJ(DATA_KEY,{}));const[meds,setMeds]=useState(()=>loadJ(MED_KEY,[]));
  const[selDate,setSelDate]=useState(today());const[draft,setDraft]=useState({});
  const[anchors,setAnchors]=useState(true);const[openNotes,setOpenNotes]=useState({});
  const[saving,setSaving]=useState(false);const[saved,setSaved]=useState(false);const[syncStatus,setSyncStatus]=useState("idle");

  useEffect(()=>{if(!unlocked)return;setSyncStatus("syncing");Promise.all([sbGE(),sbGM()]).then(([re,rm])=>{const merged={...loadJ(DATA_KEY,{}),...re};setEntries(merged);persist(DATA_KEY,merged);if(rm.length>0){setMeds(rm);persist(MED_KEY,rm);}setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000)}).catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000)})},[unlocked]);
  useEffect(()=>{const e=entries[selDate];setDraft(e?{...e}:{});setOpenNotes({})},[selDate]);

  if(!unlocked)return<><PinScreen onUnlock={()=>setUnlocked(true)}/><InstallBanner/></>;

  const isToday=selDate===today();const alreadySaved=!!entries[selDate];
  const allAnswered=DIMS.every(d=>draft[d.id]!==null&&draft[d.id]!==undefined);
  const answeredCount=DIMS.filter(d=>draft[d.id]!==null&&draft[d.id]!==undefined).length;

  const handleSave=()=>{if(!allAnswered)return;setSaving(true);const u={...entries,[selDate]:draft};persist(DATA_KEY,u);setEntries(u);setSaved(true);setSyncStatus("syncing");sbUE(selDate,draft).then(()=>{setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000)}).catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000)});setTimeout(()=>{setSaved(false);setSaving(false);setView("history")},1600)};
  const handleMedChange=med=>{setSyncStatus("syncing");sbUM(med).then(()=>{setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000)}).catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000)})};
  const handleMedDelete=id=>{setSyncStatus("syncing");sbDM(id).then(()=>{setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),3000)}).catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),4000)})};

  const sorted=Object.keys(entries).sort();const last7=sorted.slice(-7);
  const allDoseMarkers=[...new Set(meds.flatMap(m=>m.doses.map(d=>d.data)))];const markersInLast7=allDoseMarkers.filter(d=>last7.includes(d));
  const medsHoje=medsAt(meds,today());
  const dimAvg=id=>{const v=last7.map(d=>entries[d]?.[id]).filter(v=>v>0);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):null};
  const todayAvg=entries[today()]?avgEntry(entries[today()]):null;

  const navBtn=a=>({flex:1,padding:"8px 2px",borderRadius:"6px",border:`1px solid ${a?PRIMARY:BORDER}`,fontFamily:"inherit",background:a?PRIMARY:CARD,color:a?"#fff":TEXT2,fontSize:"11px",fontWeight:a?"700":"400",cursor:"pointer",transition:"all 200ms ease-in-out",boxShadow:a?"0 2px 8px rgba(9,47,89,0.2)":"none"});
  const subBtn=a=>({padding:"6px 12px",borderRadius:"6px",border:`1px solid ${a?PRIMARY:BORDER}`,fontFamily:"inherit",background:a?`${PRIMARY}10`:CARD,color:a?PRIMARY:TEXT2,fontSize:"11px",fontWeight:a?"600":"400",cursor:"pointer",transition:"all 200ms ease-in-out"});

  return(
    <>
    <div style={{minHeight:"100vh",maxWidth:"430px",margin:"0 auto",paddingBottom:"90px",background:BG}}>

      {/* Header */}
      <div style={{padding:"52px 20px 16px",background:CARD,borderBottom:`1px solid ${BORDER}`,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:"11px",letterSpacing:".2em",textTransform:"uppercase",color:PRIMARY,marginBottom:"2px",fontWeight:"700"}}>Clarity</div>
            <div style={{fontSize:"21px",fontWeight:"800",color:TEXT,letterSpacing:"-.02em"}}>Meu dia, minha evolução</div>
          </div>
          <div style={{marginTop:"4px"}}><SyncBadge status={syncStatus}/></div>
        </div>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"8px"}}>
          {medsHoje.map(m=>{const d=doseAt(m,today());return<span key={m.id} style={{fontSize:"11px",padding:"3px 10px",borderRadius:"20px",background:`${PRIMARY}10`,color:PRIMARY,fontWeight:"600",border:`1px solid ${PRIMARY}20`}}>💊 {m.nome}{d?` ${d.mg}mg`:""}</span>})}
          {medsHoje.length===0&&<span style={{fontSize:"11px",color:DISABLED}}>{meds.length===0?"Cadastre seu tratamento na aba Tratamento":"Nenhum medicamento ativo"}</span>}
        </div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",padding:"10px 16px",gap:"5px",background:CARD,borderBottom:`1px solid ${BORDER}`}}>
        {[["home","Hoje"],["history","Histórico"],["stats","Evolução"],["corr","Correlação"],["trat","Tratamento"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={navBtn(view===v)}>{l}</button>
        ))}
      </div>

      <div style={{padding:"12px 16px"}}>

        {/* ── HOJE ── */}
        {view==="home"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>

            {/* Seletor de data */}
            <div style={{...card,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
              <div>
                <div style={{fontSize:"11px",color:TEXT2,fontWeight:"600",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"3px"}}>
                  {isToday?"Data do registro":"Registro retroativo"}
                </div>
                <div style={{fontSize:"13px",fontWeight:"600",color:isToday?PRIMARY:WARNING}}>
                  {isToday?"Hoje · "+new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"}):fmtF(selDate)}
                </div>
              </div>
              <input type="date" value={selDate} max={today()} onChange={e=>setSelDate(e.target.value)}
                style={{...inp,width:"auto",padding:"7px 10px",fontSize:"12px",borderColor:isToday?BORDER:WARNING}}/>
            </div>

            {!isToday&&<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 12px",borderRadius:"6px",background:`${WARNING}10`,border:`1px solid ${WARNING}40`}}>
              <span style={{fontSize:"16px"}}>📅</span><span style={{fontSize:"12px",color:WARNING,fontWeight:"500"}}>Você está editando um registro passado</span>
            </div>}

            {alreadySaved&&todayAvg&&<div className="fa" style={{...card,background:`${SUCCESS}08`,border:`1px solid ${SUCCESS}30`,display:"flex",alignItems:"center",gap:"12px"}}>
              <span style={{fontSize:"22px"}}>✅</span>
              <div>
                <div style={{fontWeight:"600",fontSize:"13px",color:TEXT}}>{isToday?"Registrado hoje":"Já registrado neste dia"}</div>
                <div style={{fontSize:"12px",color:TEXT2}}>Média: <span style={{color:C[Math.round(todayAvg)],fontWeight:"700"}}>{todayAvg}</span> · editando abaixo</div>
              </div>
            </div>}

            {/* Progresso */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:"12px",color:TEXT2}}>
                <span style={{color:answeredCount===DIMS.length?SUCCESS:PRIMARY,fontWeight:"700"}}>{answeredCount}</span>
                <span>/{DIMS.length} respondidas</span>

              <button onClick={()=>setAnchors(p=>!p)} style={{background:BG,border:`1px solid ${BORDER}`,borderRadius:"6px",padding:"4px 10px",fontSize:"11px",color:TEXT2,fontFamily:"inherit",fontWeight:"500"}}>
                {anchors?"Ocultar âncoras":"Ver âncoras"}
              </button>
            </div>

            {/* N/A info */}
            <div style={{display:"flex",alignItems:"flex-start",gap:"8px",padding:"8px 12px",borderRadius:"6px",background:`${INFO}08`,border:`1px solid ${INFO}20`}}>
              <span style={{fontSize:"13px",marginTop:"1px"}}>ℹ️</span>
              <span style={{fontSize:"11px",color:TEXT2,lineHeight:1.5}}>Use <strong style={{color:TEXT}}>N/A</strong> para dimensões que não se aplicam hoje — ex: trabalho no fim de semana. N/A não entra na média.</span>
            </div>

            {/* Dimensões */}
            {DIMS.map(dim=>(
              <div key={dim.id} className="fa" style={{...card,
                borderColor:draft[dim.id]===0?DISABLED:draft[dim.id]>0?`${C[draft[dim.id]]}60`:BORDER,
                borderWidth:"1px",background:draft[dim.id]===0?"#F8FAFC":CARD}}>

                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>

                    <span style={{fontSize:"14px",fontWeight:"600",color:draft[dim.id]===0?DISABLED:TEXT}}>{dim.label}</span>

                  </div>
                  <button onClick={()=>setOpenNotes(p=>({...p,[dim.id]:!p[dim.id]}))}
                    style={{background:openNotes[dim.id]?`${PRIMARY}10`:BG,border:`1px solid ${openNotes[dim.id]?PRIMARY:BORDER}`,borderRadius:"6px",padding:"3px 10px",fontSize:"11px",color:openNotes[dim.id]?PRIMARY:TEXT2,fontFamily:"inherit",fontWeight:"500"}}>+ nota</button>
                </div>

                <LikertScale value={draft[dim.id]??null} onChange={v=>setDraft(p=>({...p,[dim.id]:v}))}/>

                {draft[dim.id]>0&&<div style={{textAlign:"center",fontSize:"11px",color:C[draft[dim.id]],fontWeight:"700",letterSpacing:".04em",textTransform:"uppercase",marginTop:"8px"}}>

                  <div style={{fontSize:"10px",color:TEXT2,maxWidth:"46%",lineHeight:1.5,opacity:.8}}>① {dim.a1}</div>
                  <div style={{fontSize:"10px",color:TEXT2,maxWidth:"46%",lineHeight:1.5,textAlign:"right",opacity:.8}}>⑤ {dim.a5}</div>
                </div>}

                {openNotes[dim.id]&&<textarea rows={2} placeholder={`Observação sobre ${dim.label.toLowerCase()}...`}
                  value={draft[`n_${dim.id}`]||""} onChange={e=>setDraft(p=>({...p,[`n_${dim.id}`]:e.target.value}))}
                  style={{marginTop:"12px",width:"100%",background:BG,border:`1px solid ${BORDER}`,borderRadius:"4px",padding:"10px 12px",color:TEXT,fontSize:"13px",outline:"none",lineHeight:"1.6",fontFamily:"inherit"}}/>}
              </div>
            ))}

            <button onClick={handleSave} disabled={!allAnswered||saving} style={{
              width:"100%",padding:"16px",borderRadius:"6px",border:"none",fontFamily:"inherit",
              background:saved?SUCCESS:allAnswered?PRIMARY:DISABLED,
              color:"#fff",fontSize:"15px",fontWeight:"700",
              cursor:allAnswered?"pointer":"default",transition:"all 200ms ease-in-out",
              marginTop:"4px",boxShadow:allAnswered&&!saved?"0 4px 12px rgba(9,47,89,0.25)":"none",
            }}>
              {saved?"✓ Salvo!":saving?"Salvando...":alreadySaved?"Atualizar registro":"Salvar registro"}
            </button>
          </div>
        )}

        {/* ── HISTÓRICO ── */}
        {view==="history"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              {[["cards","Cards"],["heatmap","Heatmap"],["weekly","Semanal"],["table","Tabela"]].map(([v,l])=>(
                <button key={v} onClick={()=>setHistView(v)} style={subBtn(histView===v)}>{l}</button>

            {histView==="cards"&&(sorted.length===0
              ?<div style={{textAlign:"center",padding:"56px 0",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>Nenhum registro ainda.<br/>Comece pelo "Hoje".</div>
              :[...sorted].reverse().map(date=><HistoryItem key={date} date={date} entry={entries[date]} meds={meds} allDoseMarkers={allDoseMarkers}/>)
            )}
            {histView==="heatmap"&&<HeatmapView entries={entries}/>}
            {histView==="weekly"&&<WeeklyView entries={entries}/>}
            {histView==="table"&&<div style={{...card,overflowX:"auto"}}><TableView entries={entries}/></div>}

            {sorted.length<2&&<div style={{textAlign:"center",padding:"56px 0",color:TEXT2,fontSize:"14px",lineHeight:1.8}}>Registre pelo menos 2 dias<br/>para ver a evolução.</div>}
            {sorted.length>=2&&(

                  <div style={{width:"22px",height:"0",borderTop:`2px dashed ${WARNING}`,flexShrink:0}}/>

                </div>}
                <div style={card}>
                  <div style={{fontSize:"10px",color:TEXT2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:"12px",fontWeight:"600"}}>Média geral · últimos {last7.length} dias</div>

                    {last7.map(date=>{const e=entries[date];const av=avgEntry(e);const h=av?Math.max(8,(av/5)*52):4;const isDose=allDoseMarkers.includes(date);
                      return<div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
                        <div style={{width:"100%",height:`${h}px`,borderRadius:"4px 4px 2px 2px",background:av?C[Math.round(av)]:BORDER}}/>
                        <div style={{fontSize:"9px",color:isDose?WARNING:TEXT2,fontWeight:isDose?"700":"400"}}>{fmtS(date)}</div>
                      </div>;
                    })}
                  </div>
                </div>
                {DIMS.map(dim=>{const av=dimAvg(dim.id);const data=last7.map(d=>entries[d]?.[dim.id]).filter(v=>v>0);const an=Math.round(parseFloat(av));
                  return<div key={dim.id} className="fa" style={card}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:data.length>=2?"10px":"0"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"9px"}}>
                        <span style={{fontSize:"18px"}}>{dim.icon}</span>
                        <div>
                          <div style={{fontSize:"13px",fontWeight:"600",color:TEXT}}>{dim.label}</div>
                          <div style={{fontSize:"10px",color:av?C[an]:TEXT2,fontWeight:"600",marginTop:"2px"}}>Média {av||"--"} · {last7.length} dias</div>
                        </div>
                      </div>
                      <span style={{fontSize:"22px",fontWeight:"800",color:av?C[an]:DISABLED}}>{av||"--"}</span>
                    </div>
                    {data.length>=2&&<TrendLine data={data} color={C[an]||PRIMARY} markers={markersInLast7} dates={last7}/>}
                  </div>;
                })}
              </>
            )}
          </div>
        )}

        {view==="corr"&&<CorrelacaoTab entries={entries} meds={meds}/>}
        {view==="trat"&&<TratamentoTab meds={meds} setMeds={setMeds} onMedChange={handleMedChange} onMedDelete={handleMedDelete}/>}
      </div>
    </div>
    <InstallBanner/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
